<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smart Task Manager - Add Task</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card {
      max-width: 600px;
      width:100%;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    .btn-success-gradient {
      background: linear-gradient(135deg,#28a745,#20c997);
      color:#fff;
      border:none;
    }
  </style>
</head>
<body>
  <div class="card p-4">
    <h3 class="mb-3 text-center fw-bold">Add New Task</h3>

    <form method="POST" action="addtask">
      <div class="mb-3">
        <label class="form-label fw-semibold" for="title">Task Title</label>
        <input id="title" name="title" type="text" class="form-control" placeholder="Enter task title" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold" for="description">Description</label>
        <textarea id="description" name="description" class="form-control" rows="5" placeholder="Optional description"></textarea>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-success-gradient flex-grow-1 py-2" type="submit">Add Task</button>
        <a href="viewtasks" class="btn btn-outline-secondary flex-grow-1 py-2">Back to Tasks</a>
      </div>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
