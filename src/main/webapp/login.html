<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Smart Task Manager - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#667eea,#764ba2);
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card {
      max-width: 420px;
      width:100%;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }
    .btn-primary-gradient {
      background: linear-gradient(135deg,#667eea,#764ba2);
      border: none;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card p-4">
    <h3 class="mb-3 text-center fw-bold">Smart Task Manager</h3>
    <p class="text-center text-muted mb-4">Log in to manage your tasks</p>

    <form method="POST" action="login">
      <div class="mb-3">
        <label for="email" class="form-label fw-semibold">Email</label>
        <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label fw-semibold">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary-gradient w-100 py-2 fw-semibold">Login</button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">Don't have an account? <a href="register.html">Register</a></small>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
